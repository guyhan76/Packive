<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Cut lines (red) -->
  <rect x="50" y="50" width="500" height="300" fill="none" stroke="#FF0000" stroke-width="1"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#FF0000" stroke-width="1"/>
  <line x1="400" y1="50" x2="400" y2="350" stroke="#FF0000" stroke-width="1"/>
  <!-- Fold lines (green) -->
  <line x1="150" y1="50" x2="150" y2="350" stroke="#00AA00" stroke-width="0.8" stroke-dasharray="5,3"/>
  <line x1="450" y1="50" x2="450" y2="350" stroke="#00AA00" stroke-width="0.8" stroke-dasharray="5,3"/>
  <!-- Top flaps -->
  <rect x="200" y="10" width="200" height="40" fill="none" stroke="#FF0000" stroke-width="1"/>
  <line x1="200" y1="50" x2="200" y2="10" stroke="#00AA00" stroke-width="0.8" stroke-dasharray="5,3"/>
</svg>
